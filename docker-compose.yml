services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql://symfony:symfony@db:5432/cepik?serverVersion=16&charset=utf8
      CEPIK_API_BASE_URI: https://api.cepik.gov.pl
      CEPIK_API_TIMEOUT: 10
    volumes:
      - ./app:/var/www/html
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cepik
      POSTGRES_USER: symfony
      POSTGRES_PASSWORD: symfony
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d cepik -U symfony"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
